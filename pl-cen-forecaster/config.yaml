# ---- horizon & regime -------------------------------------------------------
horizon_minutes: 60           # decision time = delivery - H  (SIDC XZ gate)
regime:
  single_price_start: "2024-06-14"   # RB reform phase 2; train from here on
  train_start:        "2024-06-15"
  da_15min_start:     "2025-09-30"   # encode as feature, don't split

# most-recent contiguous block held out as the untouched test set
test:
  weeks: 8

# ---- PSE v2 resources -------------------------------------------------------
# Slugs CONFIRMED live on 2026-07-06 against api.raporty.pse.pl.
# Full field mapping: docs/pse_api_EndpointsMap.pdf (from api.raporty.pse.pl).
# NOTE publication timing (verified from publication_ts on live data):
#   crb-rozl (CEN)   -> published D+1 ~14:00  (!! large lag; AR features must respect it)
#   rce-pln, csdac-pln -> published D-1 ~13:50 (known day-ahead; safe anchors)
#   price-fcst        -> PSE's own rolling CEN forecast; check per-row publication_ts
pse:
  base: "https://api.raporty.pse.pl/api"
  resources:
    imbalance:      "crb-rozl"       # CEN (cen_cost) + CKOEB + CEB components  [TARGET]
    price_fcst:     "price-fcst"     # PSE's own CEN/CKOEB forecast — feature + benchmark
    rce:            "rce-pln"        # RCE market energy price (pub D-1)
    da_price:       "csdac-pln"      # SDAC day-ahead price (csdac_pln) — anchor
    plan_pk5l:      "pk5l-wp"        # demand/PV/wind fcst, planned exchange, surplus (time col: plan_dtime)
    kse_load:       "kse-load"       # load_actual + load_fcst
    kse_snapshot:   "pdgobpkd"       # actual PV (gen_fv), wind (gen_wi), demand, xborder balance, reserves
    xborder_flows:  "przeplywy-mocy" # per-border flows; long format (section_code, value) — pivot
    imb_energy:     "en-rozl"        # imbalance energy volume + balance (sign of system)
    bal_energy:     "eb-rozl"        # activated balancing energy per product/direction
    reserve_prices_basic: "cmbp-tp"  # FCR/aFRR/mFRR/RR capacity prices, basic mode
    reserve_prices_suppl: "cmbu-tu"  # same, supplementary mode
    reserve_req:    "zmb"            # procured balancing capacity per product/direction
    contracting:    "sk"             # KSE contracting state (sk_cost + D-1/D forecasts)
    co2:            "rcco2"          # CO2 settlement price (daily)

target:
  resource:  "imbalance"    # -> crb-rozl
  value_col: "cen_cost"     # CEN, PLN/MWh

# ---- ENTSO-E (validation + cross-border) -----------------------------------
entsoe:
  zone: "PL"
  neighbour: "DE_LU"

# ---- paths ------------------------------------------------------------------
paths:
  raw:  "data/raw"
  proc: "data/proc"
